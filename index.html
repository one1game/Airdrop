<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airdrop Terminal</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root { 
--bg:#0d1117;
--card:#161b22;
--accent:#58a6ff;
--text:#c9d1d9;
--dim:#8b949e;
--green:#238636;
--yellow:#f2cc60;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:var(--bg);
color:var(--text);
margin:0;
padding:15px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #30363d;
padding-bottom:10px;
margin-bottom:20px;
}

.header h1{
font-size:18px;
color:var(--accent);
margin:0;
text-transform:uppercase;
}

.counter{font-size:12px;color:var(--dim);}
.user{font-size:12px;color:var(--dim);margin-top:5px;}

#app{
display:flex;
flex-direction:column;
gap:15px;
}

.card{
background:var(--card);
border:1px solid #30363d;
border-radius:12px;
padding:16px;
}

.title{
font-size:20px;
font-weight:bold;
margin-bottom:8px;
display:block;
}

.status-badge{
display:inline-block;
background:var(--green);
color:white;
font-size:10px;
padding:4px 8px;
border-radius:4px;
margin-bottom:8px;
text-transform:uppercase;
}

.category{
font-size:12px;
color:var(--accent);
font-weight:600;
margin-bottom:8px;
}

.drop{
font-size:12px;
color:var(--yellow);
font-weight:600;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:15px;
}

.item{
background:rgba(255,255,255,0.03);
padding:10px;
border-radius:8px;
}

.label{
font-size:10px;
color:var(--dim);
text-transform:uppercase;
display:block;
margin-bottom:4px;
}

.val{
font-size:14px;
font-weight:600;
}

.val.free{
color:#7ee787;
}

.btns{
display:flex;
gap:10px;
}

.btn{
flex:1;
padding:12px;
border-radius:8px;
text-align:center;
text-decoration:none;
font-weight:bold;
font-size:14px;
}

.btn-guide{
background:#30363d;
color:white;
}

.btn-main{
background:var(--accent);
color:#0d1117;
}

.disabled{
opacity:0.35;
pointer-events:none;
}

.loading{
text-align:center;
color:var(--dim);
margin-top:50px;
}
</style>
</head>

<body>

<div class="header">
<div>
<h1>Airdrop Terminal</h1>
<div class="user" id="user"></div>
</div>
<div class="counter" id="counter">0 проектов</div>
</div>

<div id="app">
<div class="loading">Загрузка...</div>
</div>

<script>

// Telegram Mini App
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

let user = tg.initDataUnsafe?.user;

if(user){
document.getElementById("user").innerHTML =
`User: ${user.username || user.first_name}`;
}

// API таблицы
const API_URL='https://api.sheetbest.com/sheets/3722b65c-1f74-43cc-ab93-fee225a8c419';

async function loadData(){

try{

const response=await fetch(API_URL);
let data=await response.json();

const container=document.getElementById('app');

if(!data || data.length===0){
container.innerHTML='<div class="loading">Нет данных</div>';
return;
}

document.getElementById('counter').innerHTML=`${data.length} проектов`;

container.innerHTML='';

// сортировка по priority (для админа)
data.sort((a,b)=> (a.priority||99)-(b.priority||99));

data.forEach(item=>{

const name=item.name||'Без названия';
const status=item.status||'ACTIVE';
const category=item.category||'—';
const cost=item.cost||'$0';
const time=item.time||'—';
const raised=item.raised||'—';
const type=item.type||'—';
const potential=item.potential||'—';
const guide=item.guide_link||'';
const ref=item.ref_link||'';
const drop=item.drop_date||'—';

const isFree=cost==='$0'||cost==='0'||cost==='Бесплатно';

// кнопки
const guideBtn = guide
? `<a href="${guide}" target="_blank" class="btn btn-guide">Инструкция</a>`
: `<div class="btn btn-guide disabled">Инструкция</div>`;

const refBtn = ref
? `<a href="${ref}" target="_blank" class="btn btn-main">Фармить</a>`
: `<div class="btn btn-main disabled">Фармить</div>`;

const card=`

<div class="card">

<div class="status-badge">${status}</div>

<span class="title">${name}</span>

<div class="category">Категория: ${category}</div>

<div class="drop">Drop: ${drop}</div>

<div class="grid">

<div class="item">
<span class="label">Траты</span>
<span class="val ${isFree?'free':''}">${cost}</span>
</div>

<div class="item">
<span class="label">Время</span>
<span class="val">${time}</span>
</div>

<div class="item">
<span class="label">Инвестиции</span>
<span class="val">${raised}</span>
</div>

<div class="item">
<span class="label">Тип</span>
<span class="val">${type}</span>
</div>

<div class="item">
<span class="label">Potential</span>
<span class="val">${potential}</span>
</div>

</div>

<div class="btns">
${guideBtn}
${refBtn}
</div>

</div>
`;

container.innerHTML+=card;

});

}

catch(error){

document.getElementById('app').innerHTML=
`<div class="loading">Ошибка: ${error.message}</div>`;

}

}

loadData();

</script>

</body>
</html>
